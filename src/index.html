<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>PicoW Turtle</title>
    <style>
    html {
        font-family: Helvetica;
        display: inline-block;
        margin: 0px auto;
        text-align: center;
    }

    .button {
        background-color: #4CAF50;
        border: none;
        color: white;
        padding: 2px 2px;
        text-decoration: none;
        font-size: 16px;
        margin: 2px;
        cursor: pointer;
    }

    .vslider {
        writing-mode: vertical-lr;
        vertical-align: middle;
    }
    .hslider {
        min-width: 250px;
    }
    .setgroup {
        display: inline-block;
    }

</style>

</head>
<body>
    <h1>PicoW Turtle</h1>
    <div id="controls">
        <div id="ap"></div>
        <div>
            <h2>Tests</h2>
            <button class="button" onclick="commandAPI('move','1.0')">MOVE 1.0</button>
            <button class="button" onclick="commandAPI('turn','1.0')">TURN 1.0</button>
            <button class="button" onclick="commandAPI('pen','up')">PEN UP</button>
            <button class="button" onclick="commandAPI('pen','down')">PEN DOWN</button>
        </div>
        <div>
            <h2>Settings</h2>
            <div>
                <div class="setgroup">
                <label for="penup">Pen Up Position</label>
                <input onchange="queueUpdate()" type="range" min="-75" max="75" step="5" value="-45" class="vslider" id="penup">
                </div>
                <div class="setgroup">
                <label for="pendown">Pen Down Position</label>
                <input onchange="queueUpdate()" type="range" min="-75" max="75" step="5" value="45" class="vslider" id="pendown">
                </div>
            </div>
            <div>
                <div class="setgroup">
                <label for="fullpower">Normal Power Level</label>
                <input onchange="queueUpdate()" type="range" min="0" max="255" step="5" value="255" class="hslider" id="fullpower">
                </div>
                <div class="setgroup">
                <label for="crawlpower">Crawling Power Level</label>
                <input onchange="queueUpdate()" type="range" min="0" max="255" step="5" value="130" class="hslider" id="crawlpower">
                </div>
                <div class="setgroup">
                <label for="stepthreshold">Minimum Steps</label>
                <input onchange="queueUpdate()" type="range" min="0" max="20" step="1" value="10" class="hslider" id="stepthreshold">
                </div>
                <div class="setgroup">
                <label for="crawlthreshold">Crawl Steps</label>
                <input onchange="queueUpdate()" type="range" min="0" max="2000" step="50" value="1000" class="hslider" id="crawlthreshold">
                </div>
            </div>
        </div>
    </div>
    <script>
        var timer=0;

        function setAPI() {
            let pu = document.querySelector("#penup").value;
            let pd = document.querySelector("#pendown").value;
            let fp = document.querySelector("#fullpower").value;
            let cp = document.querySelector("#crawlpower").value;
            let st = document.querySelector("#stepthreshold").value;
            let ct = document.querySelector("#crawlthreshold").value;
            fetch('/set?penup=' + pu + '&pendown=' + pd + '&fullpower=' + fp + '&crawlpower='+ cp + '&stepthreshold=' + st + '&crawlthreshold=' + ct).then(r => r.text()).then(t => {
                console.log(t);
                return;
            });
        }

        function queueUpdate() {
            if (timer) {
                clearTimeout(timer)
            }
            timer=setTimeout(setAPI, 375)
        }

        function commandAPI(cmd, val) {
            fetch('/command?'+cmd+'=' + val).then(r => r.text()).then(t => {
                console.log(t);
                return;
            });
        }

        function connectAPI(SSID) {
            let PWD = document.querySelector('#pwd').value;
            fetch('/connect?SSID='+SSID+'&PWD='+PWD).then(r=>{
                document.querySelector('#controls').innerHTML=`<h1>Changing Wifi connect to "${SSID}"</h1>`
            })
        }

        function APList() {
            fetch('/APs').then(r=>r.json()).then(j=>{
                if (j.length==0) {
                    return
                }
                let html='<div><h2>Available Wifi</h2>'
                html+=j.filter(s=>s!='').map(s=>`<p><button class="button" onclick="connectAPI('${s}');">Connect to ${s}</button><p>`).join('')
                html+=`<label for='pwd'>WiFi key:</label><input type='text' id='pwd' size="30" maxlength="30">`
                html+='</div>'
                document.querySelector('#ap').innerHTML=html
            })
        }
        APList()
    </script>
</body>
</html>
